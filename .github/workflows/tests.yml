name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: ${{ matrix.name }} tests (Python 3.12)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Unit
            path: tests/unit
            marker: unit
          - name: UI
            path: tests/ui
            marker: ui
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -e ".[test]"

      - name: Run ${{ matrix.name }} tests
        run: python -m pytest "${{ matrix.path }}" -m "${{ matrix.marker }}"
